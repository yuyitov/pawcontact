name = "pawcontact-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

# ─── KV Namespace ────────────────────────────────────────────────────────────
# Para obtener el id desde Cloudflare Dashboard:
# → Workers & Pages → KV → SERVICE_MENU_KV → Copy ID
# O en terminal: npx wrangler kv namespace list
#
# PASOS:
# 1. Crea el namespace en Cloudflare: https://dash.cloudflare.com/?to=/:account/workers/kv/namespaces
# 2. Copia el namespace ID aquí
[[kv_namespaces]]
binding = "SERVICE_MENU_KV"
id      = "bb9e4cced7104907adb5132c8ddcde7d"

# ─── Secrets (NO van aquí — se configura con: wrangler secret put) ────────────
# Estos secrets deben configurarse después via:
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET
#   npx wrangler secret put TALLY_SIGNING_SECRET_EN
#   npx wrangler secret put TALLY_SIGNING_SECRET_ES
#   npx wrangler secret put GITHUB_TOKEN
#   npx wrangler secret put SENDGRID_API_KEY
#   npx wrangler secret put NOTIFY_SECRET
#
# Secrets requeridos:
# - STRIPE_WEBHOOK_SECRET — obtén de: Stripe Dashboard → Webhooks → Signing secret
# - TALLY_SIGNING_SECRET_EN — signing secret del webhook del form ES de Tally
# - TALLY_SIGNING_SECRET_ES — signing secret del webhook del form EN de Tally
#   (cada form de Tally genera el suyo)
# - GITHUB_TOKEN — GitHub Personal Access Token (repo dispatch scope)
# - SENDGRID_API_KEY — obtén de: https://sendgrid.com/login → API Keys
# - NOTIFY_SECRET — genera uno: openssl rand -base64 32 (solo para ti, guardar seguro)
# - STRIPE_SECRET_KEY — OPCIONAL: activa la compra de correcciones adicionales
#   (/buy-correction crea Checkout Sessions al vuelo). Crear en Stripe una key
#   RESTRINGIDA con permiso Write solo en "Checkout Sessions" y subirla con:
#     npx wrangler secret put STRIPE_SECRET_KEY
#   Sin esta key, el botón de compra cae a la página de contacto (WhatsApp).

# ─── Environment Variables (no-secret) ────────────────────────────────────────
[vars]
# Prefijo de esta vertical para TODAS las KV keys del worker (hmu_order,
# hmu_correction, …). Distinto por vertical aunque cada una tenga su propio
# KV namespace — así el prefijo nunca es ambiguo si alguna vez se comparte uno.
PRODUCT_ID           = "pawcontact"
# Identidad que reporta el worker en GET /health y en el User-Agent con el que
# llama a la API de GitHub. Sin esta var caia al default del motor
# ("service-menu-worker", el de HMU) y este worker decia ser otro producto.
WORKER_NAME          = "pawcontact-worker"
# Modificaciones GRATIS incluidas en la compra. Es el MISMO número que imprimen
# los Términos publicados (legal.free_changes de vertical.yaml) — si los dos no
# coinciden, el producto promete por escrito algo que el worker no entrega.
FREE_CHANGES          = "2"
# Modificacion por FORMULARIO PRELLENADO (Ola 1c). PRENDIDO desde el
# 2026-07-21: los 2 formularios estan cableados por API — 21 campos de texto con
# hidden field propio + "default answer" apuntando a el (verificado renderizando
# con una URL sonda en ES y EN), mas los hidden client_slug/correction_token que
# validan la modificacion. Dropdowns, checkbox y archivos no se prellenan (mismo
# criterio que HMU). Si algun dia se recrean los formularios, el cableado se
# rehace ANTES de volver a prender esto — apagado, cae a /correct/ y nada se
# rompe.
MODIFICATION_FORM_PREFILL = "1"
# Marca usada en asuntos/cuerpos/footers de los correos.
BRAND_NAME            = "PawContact"
BRAND_TAGLINE          = "Service menus for pet businesses"
# Estilos válidos con los que el worker acepta el intake (coma-separado). Debe
# coincidir con styles.catalog de vertical.yaml — export_vertical.py lo llena
# desde ahí, así el YAML sigue siendo la fuente de verdad. Vacío = cae a los 12
# de HMU. Un estilo elegido fuera de esta lista cae al fallback (warm-sand si
# está, si no el primero) marcado style_unmapped.
VALID_BRAND_STYLES    = "sunny-paws,aqua-clean,sage-calm,warm-sand"
# ID(s) del Payment Link de esta vertical (plink_...). Acepta varios separados
# por coma — p.ej. el link USD y el MXN — para que todas las compras de esta
# vertical se procesen, ignorando ventas de otros productos de la cuenta.
# Vacío = filtro apagado (el worker loguea el plink observado para capturarlo).
STRIPE_PAYMENT_LINK_ID = "plink_1TtvhdG4Nw60erBP9P6jrZM6,plink_1TtvjfG4Nw60erBPAjvz95od,plink_1TuPyHG4Nw60erBPSTXvS2cF"
GITHUB_REPO          = "yuyitov/pawcontact"
GITHUB_ACTIONS_EVENT = "new-pawcontact-service-menu"
TALLY_FORM_URL_EN    = "https://tally.so/r/zxo55M?order_id="
TALLY_FORM_URL_ES    = "https://tally.so/r/0QyRRB?order_id="
FROM_EMAIL           = "PawContact <hello@pawcontact.com>"
# Buzón monitoreado al que llegan las respuestas de los clientes (p.ej. la
# corrección gratuita). hello@pawcontact.com SÍ recibe desde el 2026-07-20
# (Email Routing en Cloudflare → el gmail de Vero), pero el reply-to sigue
# apuntando directo para que nada dependa del reenvío.
REPLY_TO_EMAIL       = "veronica.perezarroyo@gmail.com"
PUBLIC_BOOK_BASE_URL = "https://www.pawcontact.com"
# URL pública de este worker — la usan los links de "comprar corrección
# adicional" (/buy-correction) que van en correos y en la página /correct/.
WORKER_PUBLIC_URL    = "https://pawcontact-worker.veronica-perezarroyo.workers.dev"
# OPCIONAL — Prefill de prospecto (Cory → worker, Fase 2.4). Base pública donde
# el prospector publica el prefill.json de cada prospecto: el worker lee
# `${base}/${slug}/prefill.json` y agrega esos datos a la URL del formulario de
# Tally del correo post-pago, cuando la compra llegó por un link rastreado
# (client_reference_id=<slug>). OJO: los valores aterrizan en los HIDDEN FIELDS;
# para que el cliente los VEA cargados, cada pregunta visible debe tomarlos con
# "default answer" en el editor de Tally (Tally no prellena un campo visible por
# su `name` — verificado 2026-07-21). Configurada 2026-07-18 (P7): el
# prospector de Cory ya alimenta esta vertical (pawcontact-prospector).
PROSPECT_PREFILL_BASE_URL = "https://pawcontact-prospector.pages.dev/p"
